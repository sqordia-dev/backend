name: Deploy Backend - Production

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency deploy)'
        required: false
        default: 'false'
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: api

jobs:
  # ── Maintenance Mode ───────────────────────────────────────
  enable-maintenance:
    name: Enable Maintenance Mode
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || github.event_name == 'workflow_dispatch'
    environment: production
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}
    steps:
      - name: Enable maintenance mode
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          ESTIMATED_END=$(date -u -d '+20 minutes' +"%Y-%m-%dT%H:%M:%SZ")
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/enable" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{
              "isEnabled": true,
              "deploymentId": "${{ github.run_id }}",
              "reason": "Deploying version ${{ github.event.workflow_run.head_sha || github.sha }}",
              "type": "Deployment",
              "estimatedEnd": "'"$ESTIMATED_END"'",
              "progressPercent": 5,
              "currentStep": "Starting deployment pipeline",
              "allowAdminAccess": true,
              "autoDisableMinutes": 30
            }' || echo "Failed to enable maintenance mode (API may be unreachable)"

  # ── Migrate Database ───────────────────────────────────────
  migrate-database:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: enable-maintenance
    if: >-
      always() &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || github.event_name == 'workflow_dispatch')
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Update progress
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 15, "currentStep": "Running database migrations"}' || true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true
        id: azure_login_oidc

      - name: Azure Login (Service Principal Fallback)
        if: steps.azure_login_oidc.outcome == 'failure'
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then
            echo "OIDC failed and AZURE_CLIENT_SECRET not set" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        id: azure_login_secret

      - name: Fail if all auth methods failed
        if: steps.azure_login_oidc.outcome == 'failure' && (steps.azure_login_secret.outcome == 'failure' || steps.azure_login_secret.outcome == 'skipped')
        run: exit 1

      - name: Set Azure subscription
        run: az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.10
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore and build
        run: |
          dotnet restore Sqordia.sln
          dotnet build Sqordia.sln -c Release --no-restore

      - name: Get database connection string
        id: get-db-connection
        run: |
          KEY_VAULT_NAME=$(az keyvault list \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --query "[?contains(name, 'kv')].name" \
            --output tsv | head -1)
          if [ -z "$KEY_VAULT_NAME" ]; then
            echo "Key Vault not found" && exit 1
          fi

          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "database-connection-string" \
            --query "value" --output tsv 2>/dev/null || echo "")

          if [ -n "$CONNECTION_STRING" ]; then
            echo "connection_string=$CONNECTION_STRING" >> $GITHUB_OUTPUT
          else
            DB_USER=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "postgresql-admin-username" --query "value" -o tsv 2>/dev/null || echo "${{ secrets.AZURE_POSTGRESQL_ADMIN_USERNAME }}")
            DB_PASSWORD=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "postgresql-admin-password" --query "value" -o tsv 2>/dev/null || echo "${{ secrets.AZURE_POSTGRESQL_ADMIN_PASSWORD }}")
            SERVER_FQDN=$(az postgres flexible-server show \
              --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
              --name "${{ secrets.AZURE_POSTGRESQL_SERVER_NAME }}" \
              --query "fullyQualifiedDomainName" --output tsv 2>/dev/null || echo "")
            if [ -n "$SERVER_FQDN" ] && [ -n "$DB_USER" ] && [ -n "$DB_PASSWORD" ]; then
              echo "connection_string=Host=$SERVER_FQDN;Port=5432;Database=SqordiaDb;Username=$DB_USER;Password=$DB_PASSWORD;SSL Mode=Require;" >> $GITHUB_OUTPUT
            else
              echo "Cannot resolve database connection" >> $GITHUB_STEP_SUMMARY && exit 1
            fi
          fi

      - name: Run database migrations
        run: |
          dotnet ef database update \
            --project src/Infrastructure/Sqordia.Persistence \
            --startup-project src/WebAPI \
            --configuration Release \
            --connection "${{ steps.get-db-connection.outputs.connection_string }}" \
            --no-build

      - name: Update progress
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 40, "currentStep": "Database migrations completed"}' || true

  # ── Build & Deploy Image ───────────────────────────────────
  deploy-image:
    name: Build and Deploy Image
    runs-on: ubuntu-latest
    needs: migrate-database
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      CONTAINER_REGISTRY_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}
      CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Update progress
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 50, "currentStep": "Building Docker image"}' || true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true
        id: azure_login_oidc

      - name: Azure Login (Service Principal Fallback)
        if: steps.azure_login_oidc.outcome == 'failure'
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then exit 1; fi
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        id: azure_login_secret

      - name: Fail if all auth methods failed
        if: steps.azure_login_oidc.outcome == 'failure' && (steps.azure_login_secret.outcome == 'failure' || steps.azure_login_secret.outcome == 'skipped')
        run: exit 1

      - name: Set Azure subscription
        run: az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.CONTAINER_REGISTRY_NAME }}

      - name: Build and push Docker image
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          FULL_IMAGE="${{ env.CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}"

          docker build -t "${FULL_IMAGE}:${COMMIT_SHA}" -t "${FULL_IMAGE}:latest" .
          docker push "${FULL_IMAGE}:${COMMIT_SHA}"
          docker push "${FULL_IMAGE}:latest"

      - name: Update progress
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 75, "currentStep": "Deploying to Azure Container Apps"}' || true

      - name: Deploy to Container App
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --image "${{ env.CONTAINER_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${COMMIT_SHA}"

  # ── Deploy Azure Functions ─────────────────────────────────
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: deploy-image
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true
        id: azure_login_oidc

      - name: Azure Login (Service Principal Fallback)
        if: steps.azure_login_oidc.outcome == 'failure'
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then exit 1; fi
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        id: azure_login_secret

      - name: Set Azure subscription
        if: steps.azure_login_oidc.outcome == 'success' || steps.azure_login_secret.outcome == 'success'
        run: az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Update progress
        if: env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 85, "currentStep": "Deploying Azure Functions"}' || true

      - name: Build and deploy functions
        run: |
          chmod +x scripts/deploy-azure-functions.sh
          ./scripts/deploy-azure-functions.sh ${{ env.RESOURCE_GROUP_NAME }} canadacentral || {
            echo "Functions deployment failed or skipped" >> $GITHUB_STEP_SUMMARY
          }

  # ── Health Check ───────────────────────────────────────────
  health-check:
    name: Health Check & Disable Maintenance
    runs-on: ubuntu-latest
    needs: [deploy-image, deploy-functions]
    if: always()
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      DEPLOYMENT_API_KEY: ${{ secrets.DEPLOYMENT_API_KEY }}

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true
        id: azure_login_oidc

      - name: Azure Login (Service Principal Fallback)
        if: steps.azure_login_oidc.outcome == 'failure'
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then exit 1; fi
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        id: azure_login_secret

      - name: Set Azure subscription
        if: steps.azure_login_oidc.outcome == 'success' || steps.azure_login_secret.outcome == 'success'
        run: az account set --subscription ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Get Container App URL
        id: app-url
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP_NAME }} \
            --query "properties.configuration.ingress.fqdn" --output tsv 2>/dev/null || echo "")
          echo "url=https://$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          sleep 30
          URL="${{ steps.app-url.outputs.url }}"
          if [ -n "$URL" ] && [ "$URL" != "https://" ]; then
            curl -f "$URL/health" || echo "Health check failed - app may still be starting"
          fi

      - name: Disable maintenance mode
        if: needs.deploy-image.result == 'success' && env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/disable" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"deploymentId": "${{ github.run_id }}"}' || echo "Failed to disable maintenance mode"

      - name: Update maintenance on failure
        if: needs.deploy-image.result == 'failure' && env.DEPLOYMENT_API_KEY != ''
        run: |
          curl -sf -X POST "${API_BASE_URL}/api/v1/maintenance/ci/progress" \
            -H "Content-Type: application/json" \
            -H "X-Deployment-Key: ${DEPLOYMENT_API_KEY}" \
            -d '{"progressPercent": 0, "currentStep": "Deployment failed - investigating issue"}' || true

      - name: Deployment summary
        if: always()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.app-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
