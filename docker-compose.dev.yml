services:
  sqordia-webapi:
    build:
      context: .
      dockerfile: src/WebAPI/Dockerfile
    container_name: sqordia-api-dev
    ports:
      - "5241:8080"  # Map host port 5241 to container port 8080
    environment:
      # Environment
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      
      # Database Connection - Using local PostgreSQL container
      # The service name 'sqordia-db' is used to connect to the PostgreSQL container
      - ConnectionStrings__DefaultConnection=Host=sqordia-db;Port=5432;Database=SqordiaDb;Username=sqordia;Password=SqordiaDevPass2025;Pooling=true;MinPoolSize=5;MaxPoolSize=50;
      
      # JWT Settings
      - JwtSettings__Secret=${JWT_SECRET:-fZCrXaY7jlvsqKSLpJeRbdw6TDoFIA8yB4OziUgVWH95tmQE21xh3NGkPncMu0}
      - JwtSettings__Issuer=${JWT_ISSUER:-Sqordia}
      - JwtSettings__Audience=${JWT_AUDIENCE:-SqordiaUsers}
      - JwtSettings__ExpirationMinutes=${JWT_EXPIRATION_MINUTES:-60}
      
      # Google OAuth (optional - set via environment variables)
      # For local development, you can set these in your .env file or environment
      # Client ID: 787375969256-r1qbhjb39t2r77ro1evr849ph75s8i4n.apps.googleusercontent.com
      # NOTE: Explicitly set to override any system environment variables
      - GoogleOAuth__ClientId=787375969256-r1qbhjb39t2r77ro1evr849ph75s8i4n.apps.googleusercontent.com
      - GoogleOAuth__ClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      
      # OpenAI Configuration
      # Uses appsettings.json by default. Override with OPENAI_API_KEY env var if needed.
      - OpenAI__Model=${OPENAI_MODEL:-gpt-4.1}
      - AI__OpenAI__Model=${OPENAI_MODEL:-gpt-4.1}
      
      # AI Provider Configuration
      - AI__DefaultProvider=Claude
      - AI__FallbackProviders=["OpenAI"]

      # Claude API Configuration
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI__Claude__ApiKey=${ANTHROPIC_API_KEY:-}

      # Alternative AI Providers
      # - AI__Gemini__ApiKey=${GEMINI_API_KEY:-}
      
      # Resend Email Configuration (preferred - set RESEND_API_KEY in .env file)
      # Priority: Resend > Azure Communication Services > Azure Service Bus > MockEmailService
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - Resend__ApiKey=${RESEND_API_KEY:-}
      - Resend__FromEmail=${RESEND_FROM_EMAIL:-noreply@sqordia.app}
      - Resend__FromName=${RESEND_FROM_NAME:-Sqordia}

      # Azure Communication Services Email Configuration (fallback)
      # Set AzureCommunicationServices__ConnectionString to use Azure Communication Services Email
      - AzureCommunicationServices__ConnectionString=${AZURE_COMMUNICATION_SERVICES_CONNECTION_STRING:-}
      - AzureCommunicationServices__FromEmail=${AZURE_COMMUNICATION_SERVICES_FROM_EMAIL:-sqordia.dev@gmail.com}
      - AzureCommunicationServices__FromName=${AZURE_COMMUNICATION_SERVICES_FROM_NAME:-Sqordia}

      # Alternative: SendGrid Configuration (using appsettings.Development.json via mounted volume)
      # Only set if environment variable is provided, otherwise use appsettings file
      - SendGrid__FromEmail=${SENDGRID_FROM_EMAIL:-sqordia.dev@gmail.com}
      - SendGrid__FromName=${SENDGRID_FROM_NAME:-Sqordia}
      
      # Azure Service Bus Configuration (fallback if Azure Communication Services is not configured)
      - AzureServiceBus__ConnectionString=${AZURE_SERVICE_BUS_CONNECTION_STRING:-}
      - AzureServiceBus__EmailTopic=${AZURE_SERVICE_BUS_EMAIL_TOPIC:-email-jobs}
      
      # AWS Storage (optional)
      - AwsStorage__BucketName=${S3_BUCKET_NAME:-sqordia-documents}
      - AwsStorage__Region=${AWS_REGION:-ca-central-1}
      
      # GitHub Integration (for bug reporting)
      - GitHub__PersonalAccessToken=${GITHUB_PAT:-}
      - GitHub__FrontendRepoOwner=${GITHUB_FRONTEND_REPO_OWNER:-sqordia-dev}
      - GitHub__FrontendRepoName=${GITHUB_FRONTEND_REPO_NAME:-frontend}
      - GitHub__BackendRepoOwner=${GITHUB_BACKEND_REPO_OWNER:-sqordia-dev}
      - GitHub__BackendRepoName=${GITHUB_BACKEND_REPO_NAME:-backend}

      # Stripe Configuration (for subscription payments)
      - Stripe__SecretKey=${STRIPE_SECRET_KEY:-sk_test_51SmnFeFF8GcMsSWeMsy0e7o9Q5u3BLivM43pLp8nWWy4SGuYwfMtXsArG5DZijvD76rXwvsZThofxKI4uDcCQpN7007BDYEuPz}
      - Stripe__PublishableKey=${STRIPE_PUBLISHABLE_KEY:-pk_test_51SmnFeFF8GcMsSWeVdGWiKnzV4hZ7nHFIZ8z5l6Ik3PLumKaW5gWO3AXi4BlM49Bx1C6lsq6YDKz4ngMW3C0wAkn00ABejjeqZ}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET:-whsec_f12c3935ca15a51567dc7ffc0bdfc1c0262bfbc5102d637e655076d33aea4826}
      # Stripe Price IDs
      - Stripe__PriceIds__Pro__Monthly=${STRIPE_PRICE_PRO_MONTHLY:-price_1SmnRvFF8GcMsSWeB9AqkLzK}
      - Stripe__PriceIds__Pro__Yearly=${STRIPE_PRICE_PRO_YEARLY:-price_1T56ocFF8GcMsSWe6yN8i28I}
      - Stripe__PriceIds__Enterprise__Monthly=${STRIPE_PRICE_ENTERPRISE_MONTHLY:-price_1SmnSNFF8GcMsSWeXH1gmoEz}
      - Stripe__PriceIds__Enterprise__Yearly=${STRIPE_PRICE_ENTERPRISE_YEARLY:-price_1T56ojFF8GcMsSWelTiMZNnb}

      # Azure Blob Storage (Azurite for local development)
      - AzureStorage__ConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://sqordia-azurite:10000/devstoreaccount1;
      - AzureStorage__ContainerName=sqordia-documents
      - AzureStorage__AccountName=devstoreaccount1

      # Python AI Service
      - AI__PythonService__BaseUrl=http://sqordia-ai-service:8100
      - AI__PythonService__ServiceKey=${AI_SERVICE_KEY:-dev-shared-secret-key}
      - AI__PythonService__EvaluationTimeoutSeconds=120
      - AI__PythonService__GenerationTimeoutSeconds=300

      # Disable HTTPS redirect for Docker development
      - DISABLE_HTTPS_REDIRECT=true

      # Frontend URL for CORS (development)
      - FRONTEND_BASE_URL=http://localhost:5173

      # Enable database seeding on startup (for local development)
      - Database__RunSeedsOnStartup=true
    volumes:
      # Mount logs directory if needed
      - ./logs:/app/logs
      # Mount seed script for easy updates during development
      - ./scripts/seed-all.sql:/app/scripts/seed-all.sql:ro
    networks:
      - sqordia-network
    depends_on:
      sqordia-db:
        condition: service_healthy
      sqordia-azurite:
        condition: service_healthy
      sqordia-ai-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Local PostgreSQL container for development
  sqordia-db:
    image: postgres:16-alpine
    container_name: sqordia-db-dev
    environment:
      - POSTGRES_USER=sqordia
      - POSTGRES_PASSWORD=SqordiaDevPass2025
      - POSTGRES_DB=SqordiaDb
    ports:
      - "15432:5432"  # Expose PostgreSQL port for external tools (pgAdmin, DBeaver, etc.)
    volumes:
      - sqordia-db-data:/var/lib/postgresql/data
    networks:
      - sqordia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqordia -d SqordiaDb"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Python AI Microservice (LangChain, MLflow, RAGAS)
  sqordia-ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: sqordia-ai-service-dev
    ports:
      - "8100:8100"
    environment:
      - AI_ACTIVE_PROVIDER=${AI_ACTIVE_PROVIDER:-ollama}
      - AI_FALLBACK_PROVIDERS=${AI_FALLBACK_PROVIDERS:-[]}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-gemini-2.5-flash}
      - OLLAMA_BASE_URL=http://sqordia-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:-dev-shared-secret-key}
      - MLFLOW_TRACKING_URI=http://sqordia-mlflow:5050
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=["http://localhost:5241","http://localhost:5173"]
    networks:
      - sqordia-network
    depends_on:
      sqordia-ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # MLflow Tracking Server
  sqordia-mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    container_name: sqordia-mlflow-dev
    command: mlflow server --host 0.0.0.0 --port 5050 --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - sqordia-mlflow-data:/mlflow
    networks:
      - sqordia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5050/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Ollama — Local LLM for development (no API keys needed)
  # First run pulls the model (~4GB). Subsequent runs use cached model.
  # To use a different model: OLLAMA_MODEL=mistral docker-compose up
  sqordia-ollama:
    image: ollama/ollama:latest
    container_name: sqordia-ollama-dev
    # No host port mapping — accessible only within Docker network (avoids conflict with native Ollama)
    volumes:
      - sqordia-ollama-data:/root/.ollama
    networks:
      - sqordia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Azurite - Azure Blob Storage emulator for local development
  sqordia-azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: sqordia-azurite-dev
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose"
    ports:
      - "127.0.0.1:10000:10000"  # Blob service
    volumes:
      - sqordia-azurite-data:/data
    networks:
      - sqordia-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:10000/', (r) => process.exit(r.statusCode === 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  sqordia-network:
    driver: bridge

volumes:
  sqordia-db-data:
    driver: local
  sqordia-azurite-data:
    driver: local
  sqordia-mlflow-data:
    driver: local
  sqordia-ollama-data:
    driver: local
